<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D-Druck Studio – Kundenportal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ================================================
           BASIS
        ================================================ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary:      #0056b3;
            --primary-d:    #004494;
            --success:      #28a745;
            --danger:       #dc3545;
            --warn:         #e65100;
            --bg:           #f0f4f8;
            --white:        #ffffff;
            --border:       #dde4ee;
            --text:         #1e2a3a;
            --text-m:       #4a5568;
            --text-l:       #718096;
            --shadow-sm:    0 2px 8px rgba(0,0,0,0.07);
            --shadow:       0 4px 20px rgba(0,0,0,0.09);
            --shadow-lg:    0 8px 40px rgba(0,0,0,0.12);
            --radius:       12px;
            --radius-lg:    16px;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        a { color: var(--primary); text-decoration: none; font-weight: 600; }
        a:hover { text-decoration: underline; }

        /* ================================================
           HEADER
        ================================================ */
        header {
            background: linear-gradient(135deg, #112244 0%, #0056b3 100%);
            color: white;
            position: sticky;
            top: 0;
            z-index: 200;
            box-shadow: 0 2px 16px rgba(0,0,0,0.25);
        }

        .header-inner {
            max-width: 940px;
            margin: 0 auto;
            padding: 0 16px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text { line-height: 1.2; }
        .logo-name { font-size: 0.97em; font-weight: 700; }
        .logo-sub  { font-size: 0.68em; opacity: 0.65; }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .nav-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.22);
            color: white;
            padding: 6px 13px;
            border-radius: 8px;
            font-size: 0.8em;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .nav-btn:hover { background: rgba(255,255,255,0.22); }
        .nav-btn.nav-accent { background: rgba(255,255,255,0.22); font-weight: 600; }

        .nav-user {
            font-size: 0.8em;
            opacity: 0.8;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ================================================
           MAIN / VIEWS
        ================================================ */
        main {
            max-width: 940px;
            margin: 0 auto;
            padding: 28px 16px 80px;
        }

        .view { display: none; }
        .view.aktiv { display: block; }

        /* ================================================
           CARDS
        ================================================ */
        .card {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 28px;
            margin-bottom: 20px;
        }

        .card-sm {
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }

        .card h2 {
            font-size: 1.25em;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
            border: none;
            padding: 0;
        }

        .card-sub {
            font-size: 0.85em;
            color: var(--text-l);
            margin-bottom: 24px;
        }

        /* ================================================
           FORMS
        ================================================ */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .col-full { grid-column: 1 / -1; }

        .field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .field label {
            font-size: 0.78em;
            font-weight: 700;
            color: var(--text-l);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .field input,
        .field select,
        .field textarea {
            padding: 10px 13px;
            border: 1.5px solid var(--border);
            border-radius: 9px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text);
            background: white;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,86,179,0.1);
        }

        .field input:disabled {
            background: #f5f5f5;
            color: #999;
            cursor: not-allowed;
        }

        .field textarea {
            resize: vertical;
            min-height: 80px;
        }

        .section-sep {
            font-size: 0.75em;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin: 22px 0 12px;
            padding-bottom: 7px;
            border-bottom: 1.5px solid #e0eaf8;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        /* ================================================
           BUTTONS
        ================================================ */
        .btn {
            display: inline-block;
            padding: 11px 20px;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.18s;
            text-align: center;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0056b3, #0073e6);
            color: white;
            box-shadow: 0 2px 8px rgba(0,86,179,0.25);
        }
        .btn-primary:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }

        .btn-success {
            background: linear-gradient(135deg, #28a745, #34c759);
            color: white;
            box-shadow: 0 2px 8px rgba(40,167,69,0.25);
        }
        .btn-success:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }

        .btn-outline {
            background: transparent;
            color: var(--text-m);
            border: 1.5px solid var(--border);
        }
        .btn-outline:hover:not(:disabled) { background: var(--bg); border-color: #b0bcc8; }

        .btn-danger-outline {
            background: transparent;
            color: var(--danger);
            border: 1.5px solid #f5c6cb;
        }
        .btn-danger-outline:hover:not(:disabled) { background: #fde8ea; }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .btn-sm { padding: 7px 14px; font-size: 13px; width: auto; }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-row .btn { flex: 1; }

        /* ================================================
           ALERTS
        ================================================ */
        .alert {
            padding: 11px 15px;
            border-radius: 9px;
            font-size: 0.85em;
            margin-bottom: 18px;
            display: none;
            line-height: 1.5;
        }
        .alert.on { display: block; }
        .alert-err  { background: #fde8ea; border: 1px solid #f5c6cb; color: #922; }
        .alert-ok   { background: #e8f5e9; border: 1px solid #c3e6cb; color: #155724; }
        .alert-info { background: #e3f0ff; border: 1px solid #b8d4f0; color: #0056b3; }

        /* ================================================
           STATUS BADGES
        ================================================ */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.76em;
            font-weight: 600;
            white-space: nowrap;
        }
        .b-blau  { background: #e3f0ff; color: #0056b3; }
        .b-gelb  { background: #fff3e0; color: var(--warn); }
        .b-lila  { background: #f3e5f5; color: #6a1b9a; }
        .b-gruen { background: #e8f5e9; color: #155724; }
        .b-rot   { background: #fde8ea; color: var(--danger); }
        .b-grau  { background: #f0f0f0; color: #666; }

        /* ================================================
           HERO / START SCREEN
        ================================================ */
        .hero {
            text-align: center;
            padding: 36px 16px 28px;
        }

        .hero-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0056b3 0%, #28a745 100%);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 22px;
            box-shadow: 0 8px 24px rgba(0,86,179,0.25);
        }

        .hero h1 { font-size: 1.7em; margin-bottom: 10px; }
        .hero p  {
            color: var(--text-l);
            font-size: 0.93em;
            max-width: 420px;
            margin: 0 auto 32px;
            line-height: 1.7;
        }

        .option-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            max-width: 580px;
            margin: 0 auto;
        }

        .option-card {
            background: var(--white);
            border: 2px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px 18px;
            cursor: pointer;
            transition: all 0.22s;
            text-align: center;
        }

        .option-card:hover {
            border-color: var(--primary);
            box-shadow: 0 6px 24px rgba(0,86,179,0.14);
            transform: translateY(-3px);
        }

        .option-card.full-width { grid-column: 1 / -1; }

        .oc-icon  { font-size: 34px; margin-bottom: 11px; }
        .oc-title { font-size: 0.97em; font-weight: 700; margin-bottom: 6px; }
        .oc-desc  { font-size: 0.78em; color: var(--text-l); line-height: 1.55; }

        /* ================================================
           PROFIL BOX (Dashboard)
        ================================================ */
        .profil-box {
            display: flex;
            align-items: center;
            gap: 16px;
            background: linear-gradient(135deg, #eef5ff 0%, #eef8f0 100%);
            border: 1px solid #d6e8f8;
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 20px;
        }

        .profil-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--success));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            color: white;
            font-weight: 700;
            flex-shrink: 0;
        }

        .profil-info { flex: 1; min-width: 0; }
        .profil-info h3 { font-size: 1em; margin-bottom: 2px; }
        .profil-info span { font-size: 0.82em; color: var(--text-l); display: block; }

        .profil-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        /* ================================================
           ORDER TABLE
        ================================================ */
        .order-wrap { overflow-x: auto; margin-top: 4px; }

        .order-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.87em;
            min-width: 580px;
        }

        .order-table th,
        .order-table td {
            padding: 10px 13px;
            text-align: left;
            border-bottom: 1px solid #f0f4f8;
        }

        .order-table th {
            background: #f8fafc;
            font-size: 0.78em;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-l);
            font-weight: 700;
        }

        .order-table tr:last-child td { border-bottom: none; }
        .order-table tr:hover td { background: #fafcff; }

        .order-detail {
            font-size: 0.8em;
            color: var(--text-l);
            margin-top: 2px;
        }

        /* ================================================
           BESTÄTIGUNG
        ================================================ */
        .confirm-wrap {
            text-align: center;
            padding: 32px 20px;
        }

        .confirm-icon {
            width: 76px;
            height: 76px;
            background: #e8f5e9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            margin: 0 auto 20px;
            box-shadow: 0 4px 16px rgba(40,167,69,0.15);
        }

        .confirm-id {
            background: #f8fafc;
            border: 1.5px dashed #c0c8d4;
            border-radius: 10px;
            padding: 12px 22px;
            font-family: 'Courier New', monospace;
            font-size: 1.15em;
            letter-spacing: 0.07em;
            display: inline-block;
            margin: 10px 0 22px;
            color: var(--text);
        }

        /* ================================================
           EMPTY STATE
        ================================================ */
        .empty {
            text-align: center;
            padding: 44px 20px;
            color: var(--text-l);
        }
        .empty .empty-icon { font-size: 44px; margin-bottom: 14px; }
        .empty p { font-size: 0.9em; margin-bottom: 18px; }

        /* ================================================
           LADE-OVERLAY
        ================================================ */
        #ladeOverlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.82);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(2px);
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #d8e2ef;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.65s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ================================================
           RESPONSIVE
        ================================================ */
        @media (max-width: 560px) {
            .form-grid { grid-template-columns: 1fr; }
            .option-grid { grid-template-columns: 1fr; }
            .option-card.full-width { grid-column: 1; }
            .card { padding: 20px 16px; }
            .profil-box { flex-wrap: wrap; }
            .profil-actions { width: 100%; }
            .profil-actions .btn { flex: 1; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="logo">
            <div class="logo-icon">🖨️</div>
            <div class="logo-text">
                <div class="logo-name">3D-Druck Studio</div>
                <div class="logo-sub">Kundenportal</div>
            </div>
        </div>
        <nav class="header-nav" id="headerNav">
            </nav>
    </div>
</header>

<div id="ladeOverlay">
    <div class="spinner"></div>
    <span style="font-size:14px
