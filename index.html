<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kundenportal PRO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;background:#f4f7f6;padding:20px}
.card{background:white;padding:20px;border-radius:10px;max-width:800px;margin:auto}
input,select,textarea{width:100%;margin:6px 0;padding:10px}
button{padding:10px;background:#007bff;color:white;border:none}
.order{border:1px solid #ccc;margin-top:10px;padding:10px}
</style>
</head>
<body>

<div class="card">
<h2>Kunden Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Passwort">
<button onclick="login()">Login</button>
<button onclick="register()">Registrieren</button>

<hr>

<div id="app" style="display:none">
<h2>Neuer Auftrag</h2>
<input id="projekt" placeholder="Projektname">
<select id="material"><option>PLA</option><option>PETG</option></select>
<input id="masse" placeholder="Maße">
<textarea id="beschreibung" placeholder="Beschreibung"></textarea>
<input id="adresse" placeholder="Adresse">
<input type="file" id="file">
<button onclick="send()">Senden</button>

<h3>Meine Aufträge</h3>
<div id="orders"></div>
</div>
</div>

<script>
if(!window.sbClient){
  window.sbClient = window.supabase.createClient("https://YOUR_URL.supabase.co","YOUR_KEY");
}
const db = window.sbClient;
let user = null;

async function register(){
  await db.auth.signUp({email:email.value,password:password.value});
  alert("Registriert");
}

async function login(){
  const {data,error} = await db.auth.signInWithPassword({
    email:email.value,
    password:password.value
  });

  if(error) return alert(error.message);

  user = data.user;
  app.style.display="block";
  loadOrders();
}

async function send(){
  const id = crypto.randomUUID();

  await db.from("bestellAnfragen").insert([{
    id,
    user_id:user.id,
    projekt:projekt.value,
    material_wunsch:material.value,
    masse:masse.value,
    beschreibung:beschreibung.value,
    adresse:adresse.value,
    status:"Neu",
    datum:new Date().toISOString()
  }]);

  const file = document.getElementById("file").files[0];
  if(file){
    await db.storage.from("modelle").upload(`${id}/${file.name}`,file);
  }

  loadOrders();
}

async function loadOrders(){
  const {data} = await db.from("bestellAnfragen")
    .select("*")
    .eq("user_id",user.id)
    .order("datum",{ascending:false});

  orders.innerHTML="";
</html>
