<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin PRO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;background:#eef2f5;padding:20px}
.box{background:white;padding:20px;border-radius:10px;max-width:1000px;margin:auto}
.order{border:1px solid #ccc;margin:10px;padding:10px}
</style>
</head>
<body>

<div class="box">
<h2>Admin Login</h2>
<input type="password" id="pw">
<button onclick="login()">Login</button>

<div id="panel" style="display:none">
<h2>Dashboard</h2>
<div id="orders"></div>
</div>
</div>

<script>
const ADMIN_PASSWORD = "DEIN_PASSWORT_BEIBEHALTEN";

if(!window.sbClient){
  window.sbClient = window.supabase.createClient("https://YOUR_URL.supabase.co","YOUR_KEY");
}
const db = window.sbClient;

function login(){
  if(pw.value===ADMIN_PASSWORD){
    panel.style.display="block";
    load();
  } else alert("Falsch");
}

async function load(){
  const {data} = await db.from("bestellAnfragen").select("*").order("datum",{ascending:false});

  orders.innerHTML="";

  data.forEach(o=>{
    orders.innerHTML += `<div class="order">
      <b>${o.projekt}</b><br>
      Status: ${o.status}<br>
      <input placeholder="Preis" onchange="setPrice('${o.id}',this.value)">
      <button onclick="setStatus('${o.id}','In Bearbeitung')">Start</button>
      <button onclick="setStatus('${o.id}','Druck läuft')">Druck</button>
      <button onclick="setStatus('${o.id}','Fertig')">Fertig</button>
      <button onclick="setStatus('${o.id}','Storniert')">Storno</button>
    </div>`;
  });
}

async function setStatus(id,status){
  await db.from("bestellAnfragen").update({status}).eq("id",id);
}

async function setPrice(id,price){
  await db.from("bestellAnfragen").update({kosten:price}).eq("id",id);
}

// 🔥 Realtime Admin
 db.channel('admin-orders')
  .on('postgres_changes',{event:'*',schema:'public',table:'bestellAnfragen'},payload=>{
    load();
  })
  .subscribe();
</script>

</body>
</html>
